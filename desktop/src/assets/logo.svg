<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#080b14"/>
    </linearGradient>
    <linearGradient id="node-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow-center">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="edge-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background squircle -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="1020" height="1020" rx="218" fill="none" stroke="#1e293b" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Connection lines -->
  <g stroke="url(#line-grad)" stroke-width="3" stroke-linecap="round">
    <!-- Central to surrounding -->
    <line x1="500" y1="460" x2="275" y2="310"/>
    <line x1="500" y1="460" x2="730" y2="340"/>
    <line x1="500" y1="460" x2="320" y2="680"/>
    <line x1="500" y1="460" x2="710" y2="660"/>
    <!-- Cross connections -->
    <line x1="275" y1="310" x2="730" y2="340"/>
    <line x1="320" y1="680" x2="710" y2="660"/>
    <line x1="275" y1="310" x2="320" y2="680"/>
    <line x1="730" y1="340" x2="710" y2="660"/>
  </g>

  <!-- Glow effects -->
  <circle cx="500" cy="460" r="80" fill="url(#glow-center)"/>
  <circle cx="275" cy="310" r="50" fill="url(#glow-blue)"/>
  <circle cx="730" cy="340" r="50" fill="url(#glow-purple)"/>
  <circle cx="320" cy="680" r="50" fill="url(#glow-blue)"/>
  <circle cx="710" cy="660" r="50" fill="url(#glow-purple)"/>

  <!-- Nodes -->
  <circle cx="275" cy="310" r="20" fill="#60a5fa"/>
  <circle cx="730" cy="340" r="22" fill="#818cf8"/>
  <circle cx="320" cy="680" r="18" fill="#60a5fa"/>
  <circle cx="710" cy="660" r="19" fill="#a78bfa"/>

  <!-- Central node (larger, brighter) -->
  <circle cx="500" cy="460" r="32" fill="url(#node-grad)"/>
  <circle cx="500" cy="460" r="22" fill="#e0e7ff" fill-opacity="0.3"/>

  <!-- Tiny highlight dots on nodes -->
  <circle cx="492" cy="452" r="8" fill="white" fill-opacity="0.25"/>
  <circle cx="270" cy="304" r="5" fill="white" fill-opacity="0.2"/>
  <circle cx="724" cy="334" r="5" fill="white" fill-opacity="0.2"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
    <mask id="ma">
      <rect width="1024" height="1024" fill="white"/>
      <ellipse cx="569" cy="505" rx="108" ry="188" transform="rotate(32, 569, 505)"
               stroke="black" stroke-width="52" fill="none"
               stroke-dasharray="200 1200" stroke-dashoffset="-100"/>
    </mask>
    <mask id="mb">
      <rect width="1024" height="1024" fill="white"/>
      <ellipse cx="455" cy="495" rx="112" ry="192" transform="rotate(-28, 455, 495)"
               stroke="black" stroke-width="52" fill="none"
               stroke-dasharray="200 1200" stroke-dashoffset="500"/>
    </mask>
  </defs>

  <!-- Background squircle -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1021" height="1021" rx="227" fill="none" stroke="#1a2438" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Loop A: full ellipse with crossing masked -->
  <ellipse cx="455" cy="495" rx="112" ry="192" transform="rotate(-28, 455, 495)"
           stroke="#c8d0da" stroke-width="32" stroke-linecap="round" fill="none"
           mask="url(#ma)"/>

  <!-- Loop B: full ellipse with crossing masked -->
  <ellipse cx="569" cy="505" rx="108" ry="188" transform="rotate(32, 569, 505)"
           stroke="#c8d0da" stroke-width="32" stroke-linecap="round" fill="none"
           mask="url(#mb)"/>

  <!-- Loop A front: over-crossing segment (subtle brightness for depth) -->
  <ellipse cx="455" cy="495" rx="112" ry="192" transform="rotate(-28, 455, 495)"
           stroke="#dde3ec" stroke-width="32" stroke-linecap="round" fill="none"
           stroke-dasharray="200 1200" stroke-dashoffset="500"/>

  <!-- Loop B front: over-crossing segment -->
  <ellipse cx="569" cy="505" rx="108" ry="188" transform="rotate(32, 569, 505)"
           stroke="#dde3ec" stroke-width="32" stroke-linecap="round" fill="none"
           stroke-dasharray="200 1200" stroke-dashoffset="-100"/>
</svg>
